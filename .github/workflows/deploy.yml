name: CI / CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  BACKEND_DIR: backend
  FRONTEND_DIR: frontend

jobs:
  ci:
    name: 构建 & 校验
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ${{ env.FRONTEND_DIR }}/package-lock.json

      - name: 设置 Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: ${{ env.BACKEND_DIR }}/requirements.txt

      - name: 安装前端依赖
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm ci

      - name: 构建前端
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm run build

      - name: 校验前端构建产物
        working-directory: ${{ env.FRONTEND_DIR }}
        run: |
          if [ ! -d "dist" ]; then
            echo "::error::前端构建失败，dist 目录不存在"
            exit 1
          fi
          echo "前端构建完成"
          ls -la dist

      - name: 安装后端依赖
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 校验后端 Python 语法
        working-directory: ${{ env.BACKEND_DIR }}
        run: |
          python -m compileall -q app
          echo "Python 语法校验通过"

      - name: 打包发布制品
        run: |
          mkdir -p release/frontend
          mkdir -p release/backend
          cp -r frontend/dist/* release/frontend/
          cp -r backend/app release/backend/
          cp backend/requirements.txt release/backend/
          cp backend/alembic.ini release/backend/ 2>/dev/null || true
          cp -r backend/alembic release/backend/ 2>/dev/null || true
          cp deploy/scripts/start.sh release/backend/ 2>/dev/null || true
          cp deploy/scripts/deploy.sh release/ 2>/dev/null || true
          cp -r deploy/config release/ 2>/dev/null || true

      - name: 上传发布制品
        uses: actions/upload-artifact@v4
        with:
          name: release-package
          path: release/
          retention-days: 7

  deploy:
    name: 部署到服务器
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 下载发布制品
        uses: actions/download-artifact@v4
        with:
          name: release-package
          path: release

      - name: 设置 SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: 创建远程部署目录并传输文件
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "mkdir -p ${{ secrets.DEPLOY_PATH }}/{frontend,backend} && mkdir -p ${{ secrets.DEPLOY_PATH }}/config"

      - name: 传输前端静态文件
        run: |
          rsync -avz --delete --no-perms --no-owner --no-group \
            release/frontend/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.DEPLOY_PATH }}/frontend/

      - name: 传输后端代码
        run: |
          rsync -avz --delete --no-perms --no-owner --no-group \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='.venv' \
            --exclude='venv' \
            release/backend/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.DEPLOY_PATH }}/backend/

      - name: 传输部署脚本和配置
        run: |
          rsync -avz --no-perms --no-owner --no-group \
            deploy/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.DEPLOY_PATH }}/deploy/

      - name: 在服务器上执行部署脚本
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "bash ${{ secrets.DEPLOY_PATH }}/deploy/scripts/deploy.sh"

      - name: 健康检查
        run: |
          sleep 3
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "curl -s http://127.0.0.1:8000/health"
