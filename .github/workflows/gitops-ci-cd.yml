name: CI / CD (GitOps) # v7

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'gitops/**'
      - '.github/workflows/gitops-ci-cd.yml'
  workflow_dispatch:

env:
  REGISTRY: swr.cn-north-4.myhuaweicloud.com
  IMAGE_REPO: jintianchisha
  KUSTOMIZE_PATH: gitops/overlays/prod

jobs:
  build-and-push:
    name: 构建镜像 & 推送华为云 SWR
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录到华为云 SWR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HUAWEICLOUD_SWR_USERNAME }}
          password: ${{ secrets.HUAWEICLOUD_SWR_PASSWORD }}

      - name: 生成镜像版本号
        id: meta
        run: |
          VERSION="sha-${GITHUB_SHA::7}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "使用版本号: ${VERSION}"

      - name: 构建并推送后端镜像
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/backend:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/backend:latest

      - name: 构建并推送前端镜像
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/frontend:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/frontend:latest

  deploy:
    name: 部署到 k3s 集群
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 更新 Kustomize 中的镜像 tag
        run: |
          TAG=${{ needs.build-and-push.outputs.image_tag }}
          KUSTOMIZE_FILE="${{ env.KUSTOMIZE_PATH }}/kustomization.yaml"
          echo "更新 ${KUSTOMIZE_FILE} 中的镜像 tag 为: ${TAG}"
          sed -i "/IMAGE_PLACEHOLDER_BACKEND/,/newTag/ s|newTag: .*|newTag: ${TAG}|" "${KUSTOMIZE_FILE}"
          sed -i "/IMAGE_PLACEHOLDER_FRONTEND/,/newTag/ s|newTag: .*|newTag: ${TAG}|" "${KUSTOMIZE_FILE}"
          echo "=== 更新后的 Kustomize ==="
          cat "${KUSTOMIZE_FILE}"

      - name: 部署到 k3s 集群
        run: |
          TAG=${{ needs.build-and-push.outputs.image_tag }}
          echo "=== 部署 GitOps 配置到 k3s 集群（版本: ${TAG}） ==="
          kubectl apply -k gitops/overlays/prod
          echo ""
          echo "=== 等待 Pod 滚动更新 ==="
          kubectl rollout status deployment/backend -n jintianchisha --timeout=300s
          kubectl rollout status deployment/frontend -n jintianchisha --timeout=300s
          echo ""
          echo "=== 部署结果 ==="
          kubectl get deployments -n jintianchisha
          echo ""
          kubectl get pods -n jintianchisha
          echo ""
          echo "=== 当前镜像版本 ==="
          kubectl get deployment -n jintianchisha -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.spec.template.spec.containers[0].image}{"\n"}{end}'
          echo ""
          echo "=== Ingress ==="
          kubectl get ingress -n jintianchisha
          echo ""
          echo "✅ 部署完成！"
