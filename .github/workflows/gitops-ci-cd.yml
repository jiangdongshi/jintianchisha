name: CI / CD (GitOps) # v6

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'gitops/**'
      - '.github/workflows/gitops-ci-cd.yml'
  workflow_dispatch:

env:
  REGISTRY: swr.cn-east-3.myhuaweicloud.com
  IMAGE_REPO: jintianchisha
  KUSTOMIZE_PATH: gitops/overlays/prod

jobs:
  build-and-deploy:
    name: 构建镜像 & 部署到 k3s
    runs-on: self-hosted
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 生成镜像版本号
        id: meta
        run: |
          VERSION="sha-${GITHUB_SHA::7}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "使用版本号: ${VERSION}"

      - name: 登录到华为云 SWR（nerdctl）
        run: |
          echo "${{ secrets.HUAWEICLOUD_SWR_PASSWORD }}" | nerdctl login ${{ env.REGISTRY }} \
            -u "${{ secrets.HUAWEICLOUD_SWR_USERNAME }}" --password-stdin

      - name: 构建并推送后端镜像
        run: |
          TAG=${{ steps.meta.outputs.version }}
          echo "=== 构建 backend:${TAG} ==="
          nerdctl build \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/backend:${TAG} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/backend:latest \
            ./backend
          echo "=== 推送 backend:${TAG} ==="
          nerdctl push ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/backend:${TAG}
          nerdctl push ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/backend:latest

      - name: 构建并推送前端镜像
        run: |
          TAG=${{ steps.meta.outputs.version }}
          echo "=== 构建 frontend:${TAG} ==="
          nerdctl build \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/frontend:${TAG} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/frontend:latest \
            ./frontend
          echo "=== 推送 frontend:${TAG} ==="
          nerdctl push ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/frontend:${TAG}
          nerdctl push ${{ env.REGISTRY }}/${{ env.IMAGE_REPO }}/frontend:latest

      - name: 更新 Kustomize 中的镜像 tag
        run: |
          TAG=${{ steps.meta.outputs.version }}
          KUSTOMIZE_FILE="${{ env.KUSTOMIZE_PATH }}/kustomization.yaml"
          echo "更新 ${KUSTOMIZE_FILE} 中的镜像 tag 为: ${TAG}"
          sed -i "/IMAGE_PLACEHOLDER_BACKEND/,/newTag/ s|newTag: .*|newTag: ${TAG}|" "${KUSTOMIZE_FILE}"
          sed -i "/IMAGE_PLACEHOLDER_FRONTEND/,/newTag/ s|newTag: .*|newTag: ${TAG}|" "${KUSTOMIZE_FILE}"
          echo "=== 更新后的 Kustomize ==="
          cat "${KUSTOMIZE_FILE}"

      - name: 部署到 k3s 集群
        run: |
          TAG=${{ steps.meta.outputs.version }}
          echo "=== 部署 GitOps 配置到 k3s 集群（版本: ${TAG}） ==="
          kubectl apply -k gitops/overlays/prod
          echo ""
          echo "=== 等待 Pod 滚动更新 ==="
          kubectl rollout status deployment/backend -n jintianchisha --timeout=300s
          kubectl rollout status deployment/frontend -n jintianchisha --timeout=300s
          echo ""
          echo "=== 当前状态 ==="
          kubectl get deployments -n jintianchisha
          echo ""
          kubectl get pods -n jintianchisha
          echo ""
          echo "=== 当前镜像版本 ==="
          kubectl get deployment -n jintianchisha -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.spec.template.spec.containers[0].image}{"\n"}{end}'
          echo ""
          echo "=== Ingress ==="
          kubectl get ingress -n jintianchisha
          echo ""
          echo "✅ 部署完成！"
