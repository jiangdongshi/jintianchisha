name: CI / CD (Container)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 部署目标
        required: true
        default: docker-compose
        type: choice
        options:
          - docker-compose
          - k8s
          - skip-deploy

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: ${{ github.repository }}-backend
  IMAGE_NAME_FRONTEND: ${{ github.repository }}-frontend

jobs:
  build-and-push:
    name: 构建 & 推送镜像
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录到 GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 提取镜像元数据 (backend)
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 提取镜像元数据 (frontend)
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 构建并推送后端镜像
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: 构建并推送前端镜像
        uses: docker/build-push-action@v6
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      - name: 输出镜像版本
        id: meta
        run: |
          echo "version=sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "构建完成："
          echo "- backend: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:sha-${GITHUB_SHA::7}"
          echo "- frontend: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:sha-${GITHUB_SHA::7}"

  deploy-docker-compose:
    name: 部署到 Docker Compose 服务器
    needs: build-and-push
    if: ${{ github.event_name == 'push' || github.event.inputs.deploy_target == 'docker-compose' }}
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: 传输 docker-compose.yml
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "mkdir -p ${{ secrets.DEPLOY_PATH }}"
          scp docker-compose.yml \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.DEPLOY_PATH }}/docker-compose.yml

      - name: 在服务器拉取并重启容器
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "cd ${{ secrets.DEPLOY_PATH }} && \
             echo '${{ secrets.GITHUB_TOKEN }}' | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin && \
             TAG=sha-${GITHUB_SHA::7} \
             GITHUB_REPOSITORY_OWNER=${{ github.repository_owner }} \
             docker compose pull && \
             TAG=sha-${GITHUB_SHA::7} \
             GITHUB_REPOSITORY_OWNER=${{ github.repository_owner }} \
             docker compose up -d && \
             docker image prune -f"

      - name: 健康检查
        run: |
          sleep 10
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "cd ${{ secrets.DEPLOY_PATH }} && docker compose ps && curl -s http://127.0.0.1:80/health"

  deploy-k8s:
    name: 部署到 K8s 集群
    needs: build-and-push
    if: ${{ github.event.inputs.deploy_target == 'k8s' }}
    runs-on: ubuntu-latest
    environment:
      name: k8s-production
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: 写入 kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config
          kubectl cluster-info

      - name: 滚动更新 backend
        run: |
          kubectl set image deployment/backend \
            backend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:sha-${GITHUB_SHA::7} \
            -n jintianchisha
          kubectl rollout status deployment/backend -n jintianchisha --timeout=300s

      - name: 滚动更新 frontend
        run: |
          kubectl set image deployment/frontend \
            frontend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:sha-${GITHUB_SHA::7} \
            -n jintianchisha
          kubectl rollout status deployment/frontend -n jintianchisha --timeout=300s

      - name: 查看部署状态
        run: |
          kubectl get pods -n jintianchisha
          kubectl get deployments -n jintianchisha
